# pre-commit hooks for lint/type/test automation (Node.js/TypeScript)
# Install: pip install pre-commit && pre-commit install

repos:
  # ESLint (linting)
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        pass_filenames: false
        types: [ts, js]

  # TypeScript type checking
  - repo: local
    hooks:
      - id: typecheck
        name: typecheck
        entry: npx tsc --noEmit
        language: system
        pass_filenames: false
        types: [ts]

  # Vitest smoke tests (pre-push)
  - repo: local
    hooks:
      - id: vitest-smoke
        name: vitest-smoke
        entry: npm run test:smoke
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

  # npm audit (security check)
  - repo: local
    hooks:
      - id: npm-audit
        name: npm-audit
        entry: npm audit --audit-level=moderate
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: forbid-submodules