# code-to-gate pre-commit configuration
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        pass_filenames: false
        always_run: true

      - id: typescript
        name: typescript
        entry: npx tsc --noEmit
        language: system
        pass_filenames: false
        always_run: true

      - id: test-smoke
        name: test-smoke
        entry: npm run test:smoke
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: forbid-submodules