# code-to-gate self-analysis suppressions
# These suppressions exclude findings from code-to-gate's own source code
# that are intentional (rule implementations, test fixtures, architecture decisions)
#
# Classification types:
# - self-reference: Rule implementation files that trigger on themselves
# - fixture-intentional: Test fixtures with intentional vulnerability patterns
# - generated-artifact: Compiled output, generated files
# - accepted-design: Architecture decisions, intentional patterns
# - temporary-debt: Temporary workaround, needs repayment
#
# BAN POLICY: No new suppressions for code-to-gate codebase.
# All new findings must be:
# 1. Fixed in code (preferred)
# 2. Documented in docs/rule-precision-backlog.md as false positive
# 3. Reviewed by architecture team before adding suppression
#
# This policy ensures rule precision improvements are prioritized over suppression.

