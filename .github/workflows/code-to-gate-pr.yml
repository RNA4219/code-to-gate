name: code-to-gate PR Analysis

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  macos-compatibility:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Verify CLI on macOS
        run: |
          node ./dist/cli.js --help
          node ./dist/cli.js scan fixtures/demo-ci-imports --out .qh-macos-smoke

      - name: Check Bash 3.2 syntax compatibility (macOS)
        run: |
          # macOS ships with Bash 3.2 which lacks some modern features
          # Check all shell scripts for syntax errors
          for script in scripts/*.sh; do
            if [ -f "$script" ]; then
              echo "Checking: $script"
              bash -n "$script"
            fi
          done

      - name: Verify analyze and readiness on fixture (macOS)
        run: |
          # Extended fixture verification on macOS
          node ./dist/cli.js analyze fixtures/demo-shop-ts --emit all --out .qh-macos-analyze --llm-mode none
          node ./dist/cli.js readiness fixtures/demo-shop-ts --out .qh-macos-readiness
          node ./dist/cli.js schema validate .qh-macos-analyze/findings.json
          echo "macOS fixture verification complete"

  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run diff analysis
        run: |
          node ./dist/cli.js diff . \
            --base origin/main \
            --head HEAD \
            --policy .github/ctg-policy.yaml \
            --out .qh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Export SARIF
        run: node ./dist/cli.js export sarif --from .qh --out .qh/results.sarif

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .qh/results.sarif
          category: code-to-gate-pr

      - name: Create PR comment
        uses: ./.github/actions/pr-comment
        with:
          artifact_dir: .qh
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Check run
        uses: ./.github/actions/checks
        with:
          artifact_dir: .qh
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ctg-pr-artifacts-${{ github.sha }}
          path: .qh/
          retention-days: 30

  status-check:
    runs-on: ubuntu-latest
    needs: analyze
    if: always()
    steps:
      - name: Check analysis result
        run: |
          if [ "${{ needs.analyze.result }}" == "failure" ]; then
            echo "Analysis failed - blocking PR"
            exit 1
          fi
          echo "Analysis passed"
