name: code-to-gate PR Analysis

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run diff analysis
        run: |
          node ./dist/cli.js diff . \
            --base origin/main \
            --head HEAD \
            --policy .github/ctg-policy.yaml \
            --out .qh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Export SARIF
        run: node ./dist/cli.js export sarif --from .qh --out .qh/results.sarif

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .qh/results.sarif
          category: code-to-gate-pr

      - name: Create PR comment
        uses: ./.github/actions/pr-comment
        with:
          artifact_dir: .qh
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Check run
        uses: ./.github/actions/checks
        with:
          artifact_dir: .qh
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ctg-pr-artifacts-${{ github.sha }}
          path: .qh/
          retention-days: 30

  status-check:
    runs-on: ubuntu-latest
    needs: analyze
    if: always()
    steps:
      - name: Check analysis result
        run: |
          if [ "${{ needs.analyze.result }}" == "failure" ]; then
            echo "Analysis failed - blocking PR"
            exit 1
          fi
          echo "Analysis passed"
