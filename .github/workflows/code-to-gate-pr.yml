name: code-to-gate PR Analysis

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript strict check
        run: npx tsc --noEmit

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check coverage threshold (80%)
        run: |
          coverage=$(cat coverage/coverage-summary.json | jq '.total.lines.percentage' | cut -d'.' -f1)
          echo "Coverage: $coverage%"
          if [ "$coverage" -lt 80 ]; then
            echo "::error::Coverage $coverage% is below threshold 80%"
            exit 1
          fi

  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run contract tests (downstream adapters)
        run: |
          # Contract tests for 4 downstream adapters: gatefield/state-gate/manual-bb/workflow-evidence
          npx vitest run src/__tests__/integration/export.test.ts --reporter=verbose
        timeout-minutes: 5

      - name: Validate adapter schemas
        run: |
          # Generate test artifacts and validate schemas
          node ./dist/cli.js analyze fixtures/demo-shop-ts --emit all --out .qh-contract
          node ./dist/cli.js export gatefield --from .qh-contract --out .qh-contract/gatefield.json
          node ./dist/cli.js export state-gate --from .qh-contract --out .qh-contract/state-gate.json
          node ./dist/cli.js export manual-bb --from .qh-contract --out .qh-contract/manual-bb.json
          node ./dist/cli.js export workflow-evidence --from .qh-contract --out .qh-contract/workflow.json
          # Validate all exported artifacts
          for file in .qh-contract/*.json; do
            echo "Validating: $file"
            node ./dist/cli.js schema validate "$file"
          done

      - name: Detect schema breaking changes
        run: |
          # Check for schema modifications that may break downstream compatibility
          git diff --name-only origin/main HEAD -- schemas/integrations/*.schema.json || true
          changed_schemas=$(git diff --name-only origin/main HEAD -- schemas/integrations/*.schema.json 2>/dev/null || echo "")
          if [ -n "$changed_schemas" ]; then
            echo "::warning::Schema files modified - check downstream compatibility:"
            echo "$changed_schemas"
            # Check for potential breaking changes (required field removal, type change, enum removal)
            for schema in $changed_schemas; do
              # Check if required fields were removed
              removed_required=$(git diff origin/main HEAD -- "$schema" | grep -E "^-.*\"required\"" || true)
              if [ -n "$removed_required" ]; then
                echo "::warning::Potential breaking change in $schema: required field may have been removed"
              fi
              # Check if enum values were removed
              removed_enum=$(git diff origin/main HEAD -- "$schema" | grep -E "^-.*\"enum\"" || true)
              if [ -n "$removed_enum" ]; then
                echo "::warning::Potential breaking change in $schema: enum values may have been removed"
              fi
            done
          else
            echo "No schema changes detected"
          fi

  macos-compatibility:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Verify CLI on macOS
        run: |
          node ./dist/cli.js --help
          node ./dist/cli.js scan fixtures/demo-ci-imports --out .qh-macos-smoke

      - name: Check Bash 3.2 syntax compatibility (macOS)
        run: |
          # macOS ships with Bash 3.2 which lacks some modern features
          # Check all shell scripts for syntax errors
          for script in scripts/*.sh; do
            if [ -f "$script" ]; then
              echo "Checking: $script"
              bash -n "$script"
            fi
          done

      - name: Verify analyze and readiness on fixture (macOS)
        run: |
          # Extended fixture verification on macOS
          node ./dist/cli.js analyze fixtures/demo-shop-ts --emit all --out .qh-macos-analyze --llm-mode local-only
          # readiness may return blocked_input due to critical findings - expected for demo fixture
          node ./dist/cli.js readiness fixtures/demo-shop-ts --policy .github/ctg-policy.yaml --from .qh-macos-analyze --out .qh-macos-readiness || true
          node ./dist/cli.js schema validate .qh-macos-analyze/findings.json
          # Viewer HTML generation
          node ./dist/cli.js viewer --from .qh-macos-analyze --out .qh-macos-analyze/viewer-report.html
          echo "macOS fixture verification complete"

  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Detect spec drift
        id: spec_drift
        run: |
          set +e
          node ./dist/cli.js spec-drift . --out .qh
          SPEC_DRIFT_EXIT=$?
          set -e
          if [ "$SPEC_DRIFT_EXIT" -ne 0 ] && [ ! -f .qh/spec-drift.json ]; then
            echo "::error::Spec drift detection failed before producing spec-drift.json"
            exit "$SPEC_DRIFT_EXIT"
          fi
          node ./dist/cli.js schema validate .qh/spec-drift.json
          status=$(jq -r '.status' .qh/spec-drift.json)
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" = "failed" ]; then
            echo "::warning::Spec drift found; PR review evidence will still be generated before the job fails"
          fi

      - name: Generate QEOS acceptance matrix
        run: |
          node ./dist/cli.js qeos matrix --from . --out .qh --quiet
          node ./dist/cli.js schema validate .qh/qeos-acceptance-matrix.json
          total=$(jq '.summary.total' .qh/qeos-acceptance-matrix.json)
          done_count=$(jq '.summary.done' .qh/qeos-acceptance-matrix.json)
          needs_evidence=$(jq '.summary.needsEvidence' .qh/qeos-acceptance-matrix.json)
          {
            echo "## QEOS Acceptance Matrix"
            echo "- artifact: .qh/qeos-acceptance-matrix.json"
            echo "- complete: ${done_count}/${total}"
            echo "- needs evidence: ${needs_evidence}"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$needs_evidence" -ne 0 ]; then
            echo "::error::QEOS acceptance matrix has ${needs_evidence} entries needing evidence"
            exit 1
          fi

      - name: Run diff analysis
        run: |
          set +e
          node ./dist/cli.js diff . \
            --base origin/main \
            --head HEAD \
            --policy .github/ctg-policy.yaml \
            --llm-provider deterministic \
            --out .qh
          DIFF_EXIT=$?
          set -e
          if [ "$DIFF_EXIT" -ne 0 ] && [ ! -f .qh/findings.json ]; then
            echo "::error::Diff analysis failed before producing findings.json"
            exit "$DIFF_EXIT"
          fi
          echo "Diff analysis completed with exit code $DIFF_EXIT"
      - name: Run readiness evaluation
        run: |
          set +e
          node ./dist/cli.js readiness . \
            --policy .github/ctg-policy.yaml \
            --from .qh \
            --out .qh
          READINESS_EXIT=$?
          set -e
          if [ "$READINESS_EXIT" -ne 0 ] && [ ! -f .qh/release-readiness.json ]; then
            echo "::error::Readiness evaluation failed before producing release-readiness.json"
            exit "$READINESS_EXIT"
          fi
          echo "Readiness evaluation completed with exit code $READINESS_EXIT"

      - name: Record readiness status
        id: readiness-status
        run: |
          status=$(jq -r '.status' .qh/release-readiness.json)
          echo "Readiness status: $status"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" = "blocked_input" ]; then
            echo "::warning::Release blocked by critical findings; QEG evidence will still be generated before the job fails"
          fi
          if [ "$status" = "needs_review" ]; then
            echo "::warning::Release needs review - proceed with caution"
          fi

      - name: Summarize suppression debt
        run: |
          SUPPRESSION_TOTAL=$(node -e "const fs=require('fs'); const text=fs.existsSync('.ctg/suppressions.yaml')?fs.readFileSync('.ctg/suppressions.yaml','utf8'):''; console.log((text.match(/^\\s*-\\s+ruleId:/gm)||[]).length)")
          EXPIRED_COUNT=$(node -e "const fs=require('fs'); const text=fs.existsSync('.ctg/suppressions.yaml')?fs.readFileSync('.ctg/suppressions.yaml','utf8'):''; const today=new Date().toISOString().slice(0,10); let n=0; for (const m of text.matchAll(/^\\s*expiry:\\s*([0-9]{4}-[0-9]{2}-[0-9]{2})/gm)) { if (m[1] < today) n++; } console.log(n)")
          BROAD_COUNT=0
          if [ -f .qh/self-analysis-debt.json ]; then
            BROAD_COUNT=$(jq '.broadSuppressions.total // 0' .qh/self-analysis-debt.json)
          fi
          {
            echo "## Suppression Debt Summary"
            echo "- suppressions: ${SUPPRESSION_TOTAL}"
            echo "- expired suppressions: ${EXPIRED_COUNT}"
            echo "- broad suppressions: ${BROAD_COUNT}"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$EXPIRED_COUNT" -gt 0 ]; then
            echo "::error::Expired suppressions found: ${EXPIRED_COUNT}"
            exit 1
          fi

      - name: Export SARIF
        run: node ./dist/cli.js export sarif --from .qh --out .qh/results.sarif

      - name: Validate SARIF 2.1.0
        run: |
          node --input-type=module -e 'import { readFileSync } from "node:fs"; const sarif = JSON.parse(readFileSync(".qh/results.sarif", "utf8")); if (sarif.version !== "2.1.0") throw new Error(`Invalid SARIF version: ${sarif.version}`); if (!String(sarif["$schema"] || "").includes("sarif-schema-2.1.0")) throw new Error("Invalid SARIF schema"); if (!Array.isArray(sarif.runs)) throw new Error("SARIF runs must be an array");'

      - name: Ensure repo graph for QEG
        run: |
          if [ ! -f .qh/repo-graph.json ]; then
            node ./dist/cli.js scan . --out .qh
          fi

      - name: Generate PR review source artifacts
        run: |
          node ./dist/cli.js test-plan --from .qh --out .qh
          node ./dist/cli.js schema validate .qh/test-plan.json
          node ./dist/cli.js export evidence-dag --from .qh --out .qh/evidence-dag.json
          node ./dist/cli.js schema validate .qh/evidence-dag.json

      - name: Export QEG evidence input
        run: |
          node ./dist/cli.js export qeg-code-to-gate --from .qh --out .qh/qeg-code-to-gate.json
          node ./dist/cli.js schema validate .qh/qeg-code-to-gate.json
          {
            echo "## QEG Evidence"
            echo "- artifact: .qh/qeg-code-to-gate.json"
            echo "- role: evidence-only input; final decision remains owned by QEG"
            echo "- readiness: $(jq -r '.readiness_status' .qh/qeg-code-to-gate.json)"
            echo "- findings: $(jq '.findings_summary.total' .qh/qeg-code-to-gate.json)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate PR review artifact
        run: |
          set +e
          node ./dist/cli.js pr-review \
            --from .qh \
            --out .qh \
            --artifact-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PR_REVIEW_EXIT=$?
          set -e
          if [ "$PR_REVIEW_EXIT" -ne 0 ] && [ ! -f .qh/pr-review.md ]; then
            echo "::error::PR review generation failed before producing pr-review.md"
            exit "$PR_REVIEW_EXIT"
          fi
          node ./dist/cli.js schema validate .qh/pr-review.json
          {
            echo "## PR Review"
            jq -r '"- status: \(.status)\n- block reasons: \(.summary.blockReasons)\n- suggested tests: \(.summary.additionalTests)\n- spec drift items: \(.summary.specDiffs)"' .qh/pr-review.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create PR comment
        uses: ./.github/actions/pr-comment
        with:
          artifact_dir: .qh
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Check run
        uses: ./.github/actions/checks
        with:
          artifact_dir: .qh
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ctg-pr-artifacts-${{ github.sha }}
          path: .qh/
          include-hidden-files: true
          retention-days: 30

      - name: Block PR if not ready
        if: steps.readiness-status.outputs.status == 'blocked_input' || steps.spec_drift.outputs.status == 'failed'
        run: |
          if [ "${{ steps.readiness-status.outputs.status }}" = "blocked_input" ]; then
            echo "::error::Release blocked by critical findings"
          fi
          if [ "${{ steps.spec_drift.outputs.status }}" = "failed" ]; then
            echo "::error::Spec drift blocks merge"
          fi
          echo "QEG evidence and PR review artifacts were generated under .qh and uploaded with the PR artifacts."
          exit 1

  status-check:
    runs-on: ubuntu-latest
    needs: [analyze, contract-tests, lint-typecheck, coverage]
    if: always()
    steps:
      - name: Check all required jobs
        run: |
          failed_jobs=""
          if [ "${{ needs.analyze.result }}" == "failure" ]; then
            failed_jobs="$failed_jobs analyze"
          fi
          if [ "${{ needs.contract-tests.result }}" == "failure" ]; then
            failed_jobs="$failed_jobs contract-tests"
          fi
          if [ "${{ needs.lint-typecheck.result }}" == "failure" ]; then
            failed_jobs="$failed_jobs lint-typecheck"
          fi
          if [ "${{ needs.coverage.result }}" == "failure" ]; then
            failed_jobs="$failed_jobs coverage"
          fi
          if [ -n "$failed_jobs" ]; then
            echo "::error::Jobs failed: $failed_jobs - blocking PR"
            exit 1
          fi
          echo "All jobs passed"
