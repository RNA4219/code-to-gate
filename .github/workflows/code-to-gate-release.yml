name: code-to-gate Release Readiness

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag for evidence'
        required: false
        default: ''
      policy_file:
        description: 'Policy file path'
        required: false
        default: '.github/ctg-policy.yaml'
  schedule:
    # Weekly acceptance test: Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

permissions:
  contents: read
  security-events: write
  actions: read

env:
  RELEASE_TAG: ${{ github.event.inputs.release_tag || github.sha }}

jobs:
  # Public Release Audit Gate: dependency vulnerability check
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate audit evidence and enforce high threshold
        run: |
          mkdir -p .qh
          set +e
          npm audit --audit-level=high --json > .qh/audit.json
          AUDIT_EXIT=$?
          set -e

          if [ ! -s .qh/audit.json ]; then
            echo "::error::npm audit did not produce .qh/audit.json"
            exit "$AUDIT_EXIT"
          fi

          node -e "const audit = require('./.qh/audit.json'); const v = audit.metadata?.vulnerabilities ?? {}; console.log('npm audit summary: ' + (v.critical ?? 0) + ' critical, ' + (v.high ?? 0) + ' high, ' + (v.moderate ?? 0) + ' moderate, ' + (v.low ?? 0) + ' low');"

          if [ "$AUDIT_EXIT" -ne 0 ]; then
            echo "::error::npm audit found high or critical vulnerabilities; see .qh/audit.json"
            exit "$AUDIT_EXIT"
          fi

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ctg-audit-${{ github.sha }}
          path: .qh/audit.json
          if-no-files-found: warn
          retention-days: 90

  macos-compatibility:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Verify CLI on macOS
        run: |
          node ./dist/cli.js --help
          node ./dist/cli.js scan fixtures/demo-ci-imports --out .qh-macos-smoke

  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run test coverage
        run: npm run test:coverage

      - name: Check docs review dates
        run: npm run docs:stale

      - name: Check distribution status docs
        run: npm run docs:distribution

      - name: Run full analysis
        id: analyze
        run: |
          set +e
          node ./dist/cli.js analyze . \
            --policy ${{ github.event.inputs.policy_file || '.github/ctg-policy.yaml' }} \
            --emit all \
            --out .qh \
            --llm-provider deterministic \
            --format json
          ANALYZE_EXIT=$?
          set -e

          if [ "$ANALYZE_EXIT" -ne 0 ] && [ ! -f .qh/findings.json ]; then
            echo "::error::Analysis failed before producing findings artifacts"
            exit "$ANALYZE_EXIT"
          fi

          if [ "$ANALYZE_EXIT" -ne 0 ]; then
            echo "::notice::Analysis produced findings and exited with code $ANALYZE_EXIT; continuing to readiness evaluation"
          fi
      - name: Evaluate release readiness
        id: readiness
        run: |
          set +e
          node ./dist/cli.js readiness . \
            --policy ${{ github.event.inputs.policy_file || '.github/ctg-policy.yaml' }} \
            --from .qh \
            --out .qh
          READINESS_EXIT=$?
          set -e

          if [ "$READINESS_EXIT" -ne 0 ] && [ ! -f .qh/release-readiness.json ]; then
            echo "::error::Readiness evaluation failed before producing release-readiness.json"
            exit "$READINESS_EXIT"
          fi

          if [ "$READINESS_EXIT" -ne 0 ]; then
            echo "::notice::Readiness gate returned code $READINESS_EXIT; preserving artifacts for the final gate step"
          fi

          if [ -f .qh/release-readiness.json ]; then
            STATUS=$(jq -r '.status' .qh/release-readiness.json)
            echo "status=$STATUS" >> $GITHUB_OUTPUT

            SUMMARY=$(jq -r '.summary // "No summary available"' .qh/release-readiness.json)
            echo "summary=$SUMMARY" >> $GITHUB_OUTPUT

            CRITICAL=$(jq '.counts.critical // .findings_summary.critical // 0' .qh/release-readiness.json)
            HIGH=$(jq '.counts.high // .findings_summary.high // 0' .qh/release-readiness.json)
            MEDIUM=$(jq '.counts.medium // .findings_summary.medium // 0' .qh/release-readiness.json)

            echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT
            echo "high_count=$HIGH" >> $GITHUB_OUTPUT
            echo "medium_count=$MEDIUM" >> $GITHUB_OUTPUT
          else
            echo "status=unknown" >> $GITHUB_OUTPUT
            echo "summary=Release readiness file not found" >> $GITHUB_OUTPUT
          fi

      - name: Summarize suppression debt
        run: |
          SUPPRESSION_TOTAL=$(node -e "const fs=require('fs'); const text=fs.existsSync('.ctg/suppressions.yaml')?fs.readFileSync('.ctg/suppressions.yaml','utf8'):''; console.log((text.match(/^\\s*-\\s+ruleId:/gm)||[]).length)")
          EXPIRED_COUNT=$(node -e "const fs=require('fs'); const text=fs.existsSync('.ctg/suppressions.yaml')?fs.readFileSync('.ctg/suppressions.yaml','utf8'):''; const today=new Date().toISOString().slice(0,10); let n=0; for (const m of text.matchAll(/^\\s*expiry:\\s*([0-9]{4}-[0-9]{2}-[0-9]{2})/gm)) { if (m[1] < today) n++; } console.log(n)")
          BROAD_COUNT=0
          if [ -f .qh/self-analysis-debt.json ]; then
            BROAD_COUNT=$(jq '.broadSuppressions.total // 0' .qh/self-analysis-debt.json)
          fi
          {
            echo "## Suppression Debt Summary"
            echo "- suppressions: ${SUPPRESSION_TOTAL}"
            echo "- expired suppressions: ${EXPIRED_COUNT}"
            echo "- broad suppressions: ${BROAD_COUNT}"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$EXPIRED_COUNT" -gt 0 ]; then
            echo "::error::Expired suppressions found: ${EXPIRED_COUNT}"
            exit 1
          fi

      - name: Export SARIF
        run: node ./dist/cli.js export sarif --from .qh --out .qh/results.sarif

      - name: Validate SARIF 2.1.0
        run: |
          node --input-type=module -e 'import { readFileSync } from "node:fs"; const sarif = JSON.parse(readFileSync(".qh/results.sarif", "utf8")); if (sarif.version !== "2.1.0") throw new Error(`Invalid SARIF version: ${sarif.version}`); if (!String(sarif["$schema"] || "").includes("sarif-schema-2.1.0")) throw new Error("Invalid SARIF schema"); if (!Array.isArray(sarif.runs)) throw new Error("SARIF runs must be an array");'

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .qh/results.sarif
          category: code-to-gate-release

      - name: Generate release evidence
        run: |
          npm run package:integrity
          node ./dist/cli.js export workflow-evidence --from .qh --out .qh/workflow-evidence.json
          node ./dist/cli.js export qeg-code-to-gate --from .qh --out .qh/qeg-code-to-gate.json
          node ./dist/cli.js schema validate .qh/qeg-code-to-gate.json

          # Create release evidence summary
          cat > .qh/release-evidence.md << 'EOF'
          # Release Evidence

          **Release Tag**: ${{ env.RELEASE_TAG }}
          **Commit**: ${{ github.sha }}
          **Workflow Run**: ${{ github.run_id }}
          **Timestamp**: ${{ github.event.head_commit.timestamp || github.event.repository.pushed_at }}
          **Status**: ${{ steps.readiness.outputs.status }}

          ## Summary
          ${{ steps.readiness.outputs.summary }}

          ## Findings Count
          - Critical: ${{ steps.readiness.outputs.critical_count }}
          - High: ${{ steps.readiness.outputs.high_count }}
          - Medium: ${{ steps.readiness.outputs.medium_count }}

          ## Artifacts
          - [Release Readiness](./release-readiness.json)
          - [Findings](./findings.json)
          - [Risk Register](./risk-register.yaml)
          - [Test Seeds](./test-seeds.json)
          - [Package Integrity](./package/package-integrity.json)
          - [SARIF Report](./results.sarif)
          - [Workflow Evidence](./workflow-evidence.json)
          - [QEG Code-to-gate Evidence](./qeg-code-to-gate.json)

          ## QEG
          `qeg-code-to-gate.json` is evidence-only input for quality-evidence-graph.
          Release decision ownership remains in QEG and the human release gate.
          EOF

      - name: Upload release evidence artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ctg-release-evidence-${{ github.sha }}
          path: |
            .qh/release-readiness.json
            .qh/findings.json
            .qh/risk-register.yaml
            .qh/test-seeds.json
            .qh/analysis-report.md
            .qh/results.sarif
            .qh/workflow-evidence.json
            .qh/qeg-code-to-gate.json
            .qh/release-evidence.md
            .qh/audit.json
            .qh/package/package-integrity.json
            coverage/coverage-summary.json
          retention-days: 90

      - name: Block release if not ready
        if: steps.readiness.outputs.status == 'blocked_input' || steps.readiness.outputs.status == 'needs_review'
        run: |
          echo "::error::Release blocked - readiness status: ${{ steps.readiness.outputs.status }}"
          echo "Summary: ${{ steps.readiness.outputs.summary }}"
          echo ""
          echo "Product gate checklist reference: RUNBOOK.md section 6.9"
          echo "P0 requirements:"
          echo "  - P0-01: CI/release procedure connection (this workflow)"
          echo "  - P0-02: Policy evaluator unified (verify: audit.json exit matches readiness)"
          echo "  - P0-03: 3 real repos verified (run: scripts/real-repo-test.ps1)"
          echo "  - P0-04: FP rate <= 15% (check: findings should have evidence-backed)"
          exit 1

      - name: Report success
        if: steps.readiness.outputs.status == 'passed' || steps.readiness.outputs.status == 'passed_with_risk'
        run: |
          echo "::notice::Release readiness passed with status: ${{ steps.readiness.outputs.status }}"
          echo "Summary: ${{ steps.readiness.outputs.summary }}"

  # P0-03: Periodic real repo acceptance (weekly)
  acceptance:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run fixture acceptance
        run: |
          pwsh -File ./scripts/fixture-acceptance.ps1 -OutDir .qh/acceptance/fixtures

      - name: Upload acceptance evidence
        uses: actions/upload-artifact@v7
        with:
          name: ctg-acceptance-evidence-${{ github.sha }}
          path: .qh/acceptance/
          retention-days: 90
